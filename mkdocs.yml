site_name: DemoFoundry
site_description: Build software demo videos — script, narrate, automate, localize.

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - User Guide:
      - Overview: guide/overview.md
      - CLI: guide/cli.md
      - Library: guide/library.md
  - MVP Features: features.md
  - Architecture:
      - Overview: architecture/index.md
      - MVP - local web app: architecture/mvp.md
      - Automation & capture: architecture/automation.md
      - Sync engine: architecture/sync-engine.md
      - Scripting with Claude: architecture/scripting.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true
